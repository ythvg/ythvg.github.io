<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>AI 导航 — 大模型工具全收录</title>
<style>
:root{
  --bg:#0d0d12;--bg2:#13131a;--bg3:#1a1a24;--bg4:#22222e;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.12);
  --text:#e2e2f0;--text2:#8888a8;
  --purple:#a78bfa;--blue:#60a5fa;--green:#34d399;--orange:#fb923c;
  --pink:#f472b6;--yellow:#fbbf24;--cyan:#22d3ee;
  --radius:12px;--nav-h:58px;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.6}

/* Nav */
nav{position:fixed;top:0;left:0;right:0;height:var(--nav-h);background:rgba(13,13,18,0.92);backdrop-filter:blur(14px);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:16px;z-index:200}
.nav-logo{font-weight:800;font-size:1.1rem;white-space:nowrap;background:linear-gradient(90deg,var(--purple),var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.nav-search{flex:1;max-width:480px;position:relative}
.nav-search input{width:100%;padding:8px 14px 8px 36px;background:var(--bg3);border:1px solid var(--border2);border-radius:99px;color:var(--text);font-size:0.9rem;outline:none;transition:border-color .2s}
.nav-search input:focus{border-color:rgba(167,139,250,.5)}
.nav-search input::placeholder{color:var(--text2)}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text2);font-size:0.9rem;pointer-events:none}
.nav-count{font-size:0.8rem;color:var(--text2);white-space:nowrap;margin-left:auto}

/* Layout */
.layout{display:flex;padding-top:var(--nav-h);min-height:100vh}

/* Sidebar */
.sidebar{width:196px;flex-shrink:0;padding:16px 10px;position:sticky;top:var(--nav-h);height:calc(100vh - var(--nav-h));overflow-y:auto;border-right:1px solid var(--border)}
.sidebar::-webkit-scrollbar{width:3px}
.sidebar::-webkit-scrollbar-thumb{background:#2a2a38;border-radius:2px}
.sidebar-title{font-size:0.68rem;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--text2);padding:0 10px;margin:16px 0 6px}
.sidebar-title:first-child{margin-top:0}
.cat-btn{display:flex;align-items:center;gap:8px;width:100%;padding:7px 10px;border:none;border-radius:8px;background:transparent;color:var(--text2);font-size:0.87rem;cursor:pointer;transition:all .15s;text-align:left}
.cat-btn:hover{background:var(--bg3);color:var(--text)}
.cat-btn.active{background:rgba(167,139,250,.12);color:var(--purple)}
.cat-btn .cat-count{margin-left:auto;font-size:0.7rem;background:var(--bg4);padding:1px 7px;border-radius:99px;color:var(--text2)}
.cat-btn.active .cat-count{background:rgba(167,139,250,.2);color:var(--purple)}

/* Main */
.main{flex:1;padding:24px 22px 80px;min-width:0}

/* Hero */
.hero-strip{background:linear-gradient(135deg,rgba(167,139,250,.07),rgba(34,211,238,.05));border:1px solid rgba(167,139,250,.14);border-radius:16px;padding:22px 28px;margin-bottom:28px;display:flex;align-items:center;gap:24px;flex-wrap:wrap}
.hero-text h1{font-size:1.5rem;font-weight:800;background:linear-gradient(90deg,var(--purple),var(--blue),var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hero-text p{color:var(--text2);font-size:0.88rem;margin-top:5px}
.hero-stats{display:flex;gap:28px;margin-left:auto}
.stat-num{font-size:1.7rem;font-weight:800;background:linear-gradient(135deg,var(--purple),var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1}
.stat-label{font-size:0.7rem;color:var(--text2);margin-top:2px;text-align:center}

/* Section header */
.section-hd{display:flex;align-items:center;gap:10px;margin:6px 0 14px}
.section-hd h2{font-size:0.97rem;font-weight:700}
.section-count{font-size:0.72rem;color:var(--text2);background:var(--bg3);padding:2px 9px;border-radius:99px}

/* Grid */
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:12px;margin-bottom:36px}

/* Card */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:15px;text-decoration:none;color:var(--text);display:flex;flex-direction:column;gap:9px;position:relative;overflow:hidden;transition:all .18s}
.card::before{content:'';position:absolute;inset:0;opacity:0;transition:opacity .2s;pointer-events:none;border-radius:var(--radius)}
.card:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(0,0,0,.4)}

.card[data-cat="chat"]:hover{border-color:rgba(167,139,250,.4)}
.card[data-cat="chat"]::before{background:radial-gradient(ellipse at 0 0,rgba(167,139,250,.07),transparent 65%)}
.card[data-cat="coding"]:hover{border-color:rgba(96,165,250,.4)}
.card[data-cat="coding"]::before{background:radial-gradient(ellipse at 0 0,rgba(96,165,250,.07),transparent 65%)}
.card[data-cat="image"]:hover{border-color:rgba(244,114,182,.4)}
.card[data-cat="image"]::before{background:radial-gradient(ellipse at 0 0,rgba(244,114,182,.07),transparent 65%)}
.card[data-cat="video"]:hover{border-color:rgba(251,191,36,.4)}
.card[data-cat="video"]::before{background:radial-gradient(ellipse at 0 0,rgba(251,191,36,.07),transparent 65%)}
.card[data-cat="audio"]:hover{border-color:rgba(52,211,153,.4)}
.card[data-cat="audio"]::before{background:radial-gradient(ellipse at 0 0,rgba(52,211,153,.07),transparent 65%)}
.card[data-cat="search"]:hover{border-color:rgba(34,211,238,.4)}
.card[data-cat="search"]::before{background:radial-gradient(ellipse at 0 0,rgba(34,211,238,.07),transparent 65%)}
.card[data-cat="api"]:hover{border-color:rgba(251,146,60,.4)}
.card[data-cat="api"]::before{background:radial-gradient(ellipse at 0 0,rgba(251,146,60,.07),transparent 65%)}
.card[data-cat="agent"]:hover{border-color:rgba(163,230,53,.4)}
.card[data-cat="agent"]::before{background:radial-gradient(ellipse at 0 0,rgba(163,230,53,.07),transparent 65%)}
.card[data-cat="learn"]:hover{border-color:rgba(248,113,113,.4)}
.card[data-cat="learn"]::before{background:radial-gradient(ellipse at 0 0,rgba(248,113,113,.07),transparent 65%)}
.card:hover::before{opacity:1}

.card-top{display:flex;align-items:flex-start;gap:10px}
.card-icon{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:1.2rem;flex-shrink:0;background:var(--bg3)}
.card-meta{flex:1;min-width:0}
.card-name{font-weight:700;font-size:0.92rem;display:flex;align-items:center;gap:5px;flex-wrap:wrap;line-height:1.3}
.card-url{font-size:0.72rem;color:var(--text2);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.card-desc{font-size:0.81rem;color:var(--text2);line-height:1.55;flex:1}
.card-tags{display:flex;flex-wrap:wrap;gap:4px}

/* Badges */
.badge{font-size:0.66rem;font-weight:700;padding:2px 7px;border-radius:99px;letter-spacing:.2px;white-space:nowrap}
.badge-free{background:rgba(52,211,153,.12);color:#34d399;border:1px solid rgba(52,211,153,.25)}
.badge-paid{background:rgba(251,146,60,.12);color:#fb923c;border:1px solid rgba(251,146,60,.25)}
.badge-freemium{background:rgba(167,139,250,.12);color:#a78bfa;border:1px solid rgba(167,139,250,.25)}
.badge-api{background:rgba(96,165,250,.12);color:#60a5fa;border:1px solid rgba(96,165,250,.25)}
.badge-open{background:rgba(163,230,53,.12);color:#a3e635;border:1px solid rgba(163,230,53,.25)}
.badge-new{background:rgba(251,191,36,.14);color:#fbbf24;border:1px solid rgba(251,191,36,.3)}
.badge-hot{background:rgba(244,114,182,.1);color:#f472b6;border:1px solid rgba(244,114,182,.22)}
.badge-cn{background:rgba(34,211,238,.1);color:#22d3ee;border:1px solid rgba(34,211,238,.22)}

/* Tags */
.tag{font-size:0.68rem;padding:2px 7px;border-radius:6px;background:var(--bg4);color:var(--text2)}

/* Empty */
.empty{text-align:center;padding:80px 20px;color:var(--text2);display:none}
.empty-icon{font-size:3rem;margin-bottom:12px}

/* Scrollbar */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:#2a2a38;border-radius:3px}

@media(max-width:700px){
  .sidebar{display:none}
  .hero-stats{display:none}
  .cards-grid{grid-template-columns:repeat(auto-fill,minmax(160px,1fr))}
  .main{padding:16px 14px 60px}
}
</style>
</head>
<body>

<nav>
  <div class="nav-logo">✦ AI 导航</div>
  <div class="nav-search">
    <span class="search-icon">🔍</span>

  <main class="main">

        <div><div class="stat-num">2026</div><div class="stat-label">持续更新</div></div>
      </div>
    </div>

    <div class="empty" id="noResult">
      <div class="empty-icon">🔭</div>
      <p>没有找到匹配的工具，换个关键词试试</p>
    </div>

    <div id="cardContainer"></div>
  </main>
</div>

const CAT_META = {
  chat:   {label:'对话助手',    color:'var(--purple)'},
  api:    {label:'API & 平台',  color:'var(--orange)'},
  image:  {label:'图像生成',    color:'var(--pink)'},
  video:  {label:'视频生成',    color:'var(--yellow)'},
  audio:  {label:'音频 & 语音', color:'var(--green)'},
  coding: {label:'AI 编程',     color:'var(--blue)'},
  search: {label:'AI 搜索',     color:'var(--cyan)'},
  agent:  {label:'Agent & 自动化', color:'#a3e635'},
  learn:  {label:'学习 & 社区', color:'#f87171'},
};

const CAT_ICON = {chat:'🤖',api:'⚡',image:'🎨',video:'🎬',audio:'🎵',coding:'💻',search:'🔍',agent:'🔧',learn:'📚'};
const CAT_ORDER = ['chat','coding','image','video','audio','search','api','agent','learn'];

const BADGE_MAP = {free:'免费',paid:'付费',freemium:'免费+',api:'API',open:'开源',new:'NEW',hot:'🔥热门',cn:'国内'};

let currentCat = 'all';
let searchQuery = '';

function badgeHTML(b){
  return `<span class="badge badge-${b}">${BADGE_MAP[b]||b}</span>`;
}

function renderCards(){
  const container = document.getElementById('cardContainer');
  const noResult  = document.getElementById('noResult');
  const q = searchQuery.toLowerCase();

  const filtered = TOOLS.filter(t => {
    const matchCat = currentCat === 'all' || t.cat === currentCat;
    const matchQ   = !q ||
      t.name.toLowerCase().includes(q) ||
      t.desc.toLowerCase().includes(q) ||
      (t.tags||[]).some(tg => tg.toLowerCase().includes(q)) ||
      (t.badges||[]).some(b => b.toLowerCase().includes(q)) ||
      (CAT_META[t.cat]?.label||'').includes(q);
    return matchCat && matchQ;
  });

  document.getElementById('navCount').textContent = filtered.length + ' 个工具';

  if(!filtered.length){
    container.innerHTML = '';
    noResult.style.display = 'block';
    return;
  }
  noResult.style.display = 'none';

  const groups = {};
  if(currentCat === 'all'){
    CAT_ORDER.forEach(c => {
      const items = filtered.filter(t => t.cat === c);
      if(items.length) groups[c] = items;
    });
  } else {
    groups[currentCat] = filtered;
  }

  let html = '';
  for(const [cat, items] of Object.entries(groups)){
    const meta = CAT_META[cat];
    html += `<div class="section-hd">
      <h2 style="color:${meta.color}">${CAT_ICON[cat]} ${meta.label}</h2>
      <span class="section-count">${items.length}</span>
    </div><div class="cards-grid">`;
    for(const t of items){
      const badges = (t.badges||[]).map(badgeHTML).join('');
      const tags   = (t.tags||[]).map(tg=>`<span class="tag">${tg}</span>`).join('');
      html += `<a class="card" data-cat="${t.cat}" href="https://${t.url}" target="_blank" rel="noopener">
        <div class="card-top">
          <div class="card-icon">${t.icon}</div>
          <div class="card-meta">
            <div class="card-name">${t.name} ${badges}</div>
            <div class="card-url">${t.url}</div>
          </div>
        </div>
        <div class="card-desc">${t.desc}</div>
        <div class="card-tags">${tags}</div>
      </a>`;
    }
    html += '</div>';
  }
  container.innerHTML = html;
}

function updateCounts(){
  document.getElementById('totalCount').textContent = TOOLS.length;
  document.getElementById('cnt-all').textContent = TOOLS.length;
  CAT_ORDER.forEach(c => {
    const el = document.getElementById('cnt-'+c);
    if(el) el.textContent = TOOLS.filter(t=>t.cat===c).length;
  });
}

function filterCat(cat, btn){
  currentCat = cat;
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderCards();
}

let searchTimer;
document.getElementById('searchInput').addEventListener('input', e => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => {
    searchQuery = e.target.value.trim();
    renderCards();
  }, 150);
});

updateCounts();
renderCards();
</script>
