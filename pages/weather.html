<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>天气查询</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      color: #fff;
      transition: background 1s ease;
    }

    body.day-clear {
      background: linear-gradient(135deg, #56ccf2 0%, #2f80ed 100%);
    }
    body.day-cloudy {
      background: linear-gradient(135deg, #8e9eab 0%, #616161 100%);
    }
    body.day-rain {
      background: linear-gradient(135deg, #4b6cb7 0%, #182848 100%);
    }
    body.day-snow {
      background: linear-gradient(135deg, #e0eafc 0%, #cfdef3 100%);
      color: #333;
    }
    body.night-clear {
      background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
    }
    body.night-cloudy {
      background: linear-gradient(135deg, #1c1c1c 0%, #2d3436 100%);
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 20px;
    }

    header {
      text-align: center;
      padding: 30px 0 20px;
    }

    header h1 {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-shadow: 0 2px 10px rgba(0,0,0,0.3);
    }

    header p {
      opacity: 0.7;
      margin-top: 6px;
      font-size: 0.9rem;
    }

    .search-box {
      display: flex;
      gap: 10px;
      max-width: 480px;
      margin: 20px auto 30px;
    }

    .search-box input {
      flex: 1;
      padding: 12px 18px;
      border: none;
      border-radius: 30px;
      background: rgba(255,255,255,0.2);
      backdrop-filter: blur(10px);
      color: #fff;
      font-size: 1rem;
      outline: none;
      transition: background 0.3s;
    }

    .search-box input::placeholder {
      color: rgba(255,255,255,0.6);
    }

    .search-box input:focus {
      background: rgba(255,255,255,0.3);
    }

    .search-box button {
      padding: 12px 22px;
      border: none;
      border-radius: 30px;
      background: rgba(255,255,255,0.9);
      color: #333;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .search-box button:hover {
      background: #fff;
      transform: scale(1.04);
    }

    .search-box button:active {
      transform: scale(0.98);
    }

    .error-msg {
      text-align: center;
      padding: 12px 20px;
      background: rgba(255,80,80,0.2);
      border-radius: 12px;
      margin-bottom: 20px;
      display: none;
    }

    .loading {
      text-align: center;
      padding: 60px 20px;
      display: none;
    }

    .spinner {
      width: 44px;
      height: 44px;
      border: 4px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .weather-content {
      display: none;
    }

    /* Current weather card */
    .current-card {
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(16px);
      border-radius: 24px;
      padding: 30px;
      margin-bottom: 20px;
      border: 1px solid rgba(255,255,255,0.2);
      box-shadow: 0 8px 32px rgba(0,0,0,0.2);
    }

    .city-info {
      display: flex;
      align-items: baseline;
      gap: 10px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .city-name {
      font-size: 1.8rem;
      font-weight: 700;
    }

    .country-name {
      font-size: 1rem;
      opacity: 0.7;
    }

    .update-time {
      font-size: 0.8rem;
      opacity: 0.55;
      margin-left: auto;
    }

    .main-weather {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }

    .weather-icon {
      font-size: 5rem;
      line-height: 1;
      filter: drop-shadow(0 4px 8px rgba(0,0,0,0.3));
    }

    .temp-block {
      display: flex;
      flex-direction: column;
    }

    .temperature {
      font-size: 4rem;
      font-weight: 300;
      line-height: 1;
    }

    .feels-like {
      font-size: 0.95rem;
      opacity: 0.7;
      margin-top: 4px;
    }

    .weather-desc {
      font-size: 1.3rem;
      font-weight: 500;
      margin-left: auto;
      text-align: right;
    }

    .details-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
      gap: 14px;
    }

    .detail-item {
      background: rgba(255,255,255,0.1);
      border-radius: 14px;
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .detail-label {
      font-size: 0.78rem;
      opacity: 0.6;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .detail-value {
      font-size: 1.1rem;
      font-weight: 600;
    }

    /* Forecast */
    .forecast-title {
      font-size: 1rem;
      font-weight: 600;
      opacity: 0.8;
      margin-bottom: 12px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .forecast-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 10px;
    }

    @media (max-width: 600px) {
      .forecast-grid {
        grid-template-columns: repeat(4, 1fr);
      }
    }

    @media (max-width: 380px) {
      .forecast-grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    .forecast-card {
      background: rgba(255,255,255,0.12);
      backdrop-filter: blur(12px);
      border-radius: 16px;
      padding: 14px 8px;
      text-align: center;
      border: 1px solid rgba(255,255,255,0.15);
      transition: transform 0.2s, background 0.2s;
    }

    .forecast-card:hover {
      transform: translateY(-3px);
      background: rgba(255,255,255,0.2);
    }

    .forecast-day {
      font-size: 0.78rem;
      opacity: 0.7;
      margin-bottom: 8px;
    }

    .forecast-icon {
      font-size: 1.8rem;
      margin-bottom: 8px;
    }

    .forecast-temp {
      font-size: 0.9rem;
      font-weight: 600;
    }

    .forecast-temp span {
      opacity: 0.6;
      font-weight: 400;
      font-size: 0.8rem;
    }

    .refresh-info {
      text-align: center;
      font-size: 0.8rem;
      opacity: 0.5;
      margin-top: 20px;
      padding-bottom: 20px;
    }

    .welcome {
      text-align: center;
      padding: 60px 20px;
      opacity: 0.7;
    }

    .welcome .big-icon {
      font-size: 5rem;
      margin-bottom: 16px;
    }

    .welcome p {
      font-size: 1.1rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>🌤 天气查询</h1>
      <p>实时全球天气数据 · 每 10 分钟自动刷新</p>
    </header>

    <div class="search-box">
      <input type="text" id="searchInput" placeholder="输入城市名，如：北京、Tokyo、London…" autocomplete="off" />
      <button id="searchBtn">搜索</button>
    </div>

    <div class="error-msg" id="errorMsg"></div>
    <div class="loading" id="loading">
      <div class="spinner"></div>
      <p>正在获取天气数据…</p>
    </div>

    <div class="welcome" id="welcome">
      <div class="big-icon">🌍</div>
      <p>输入城市名称，查看实时天气</p>
    </div>

    <div class="weather-content" id="weatherContent">
      <div class="current-card">
        <div class="city-info">
          <span class="city-name" id="cityName"></span>
          <span class="country-name" id="countryName"></span>
          <span class="update-time" id="updateTime"></span>
        </div>
        <div class="main-weather">
          <div class="weather-icon" id="weatherIcon"></div>
          <div class="temp-block">
            <div class="temperature" id="temperature"></div>
            <div class="feels-like" id="feelsLike"></div>
          </div>
          <div class="weather-desc" id="weatherDesc"></div>
        </div>
        <div class="details-grid">
          <div class="detail-item">
            <span class="detail-label">湿度</span>
            <span class="detail-value" id="humidity"></span>
          </div>
          <div class="detail-item">
            <span class="detail-label">风速</span>
            <span class="detail-value" id="windSpeed"></span>
          </div>
          <div class="detail-item">
            <span class="detail-label">风向</span>
            <span class="detail-value" id="windDir"></span>
          </div>
          <div class="detail-item">
            <span class="detail-label">能见度</span>
            <span class="detail-value" id="visibility"></span>
          </div>
          <div class="detail-item">
            <span class="detail-label">UV 指数</span>
            <span class="detail-value" id="uvIndex"></span>
          </div>
          <div class="detail-item">
            <span class="detail-label">气压</span>
            <span class="detail-value" id="pressure"></span>
          </div>
        </div>
      </div>

      <div class="current-card">
        <div class="forecast-title">未来 7 天预报</div>
        <div class="forecast-grid" id="forecastGrid"></div>
      </div>
    </div>

    <div class="refresh-info" id="refreshInfo"></div>
  </div>

  <script>
    // ── Weather code mappings ──────────────────────────────────────────────────
    const WMO_DESC = {
      0: '晴天', 1: '基本晴朗', 2: '局部多云', 3: '阴天',
      45: '雾', 48: '雾凇',
      51: '毛毛雨', 53: '中度毛毛雨', 55: '浓毛毛雨',
      61: '小雨', 63: '中雨', 65: '大雨',
      71: '小雪', 73: '中雪', 75: '大雪', 77: '冰粒',
      80: '阵雨', 81: '中阵雨', 82: '强阵雨',
      85: '阵雪', 86: '强阵雪',
      95: '雷阵雨', 96: '雷阵雨伴冰雹', 99: '强雷阵雨伴冰雹',
    };

    const WMO_ICON = {
      0: '☀️', 1: '🌤', 2: '⛅', 3: '☁️',
      45: '🌫', 48: '🌫',
      51: '🌦', 53: '🌦', 55: '🌧',
      61: '🌧', 63: '🌧', 65: '🌧',
      71: '🌨', 73: '🌨', 75: '❄️', 77: '🌨',
      80: '🌦', 81: '🌧', 82: '⛈',
      85: '🌨', 86: '❄️',
      95: '⛈', 96: '⛈', 99: '⛈',
    };

    const WMO_BG = {
      0: 'day-clear', 1: 'day-clear', 2: 'day-cloudy', 3: 'day-cloudy',
      45: 'day-cloudy', 48: 'day-cloudy',
      51: 'day-rain', 53: 'day-rain', 55: 'day-rain',
      61: 'day-rain', 63: 'day-rain', 65: 'day-rain',
      71: 'day-snow', 73: 'day-snow', 75: 'day-snow', 77: 'day-snow',
      80: 'day-rain', 81: 'day-rain', 82: 'day-rain',
      85: 'day-snow', 86: 'day-snow',
      95: 'day-rain', 96: 'day-rain', 99: 'day-rain',
    };

    const WIND_DIRS = ['北', '东北偏北', '东北', '东北偏东',
      '东', '东南偏东', '东南', '东南偏南',
      '南', '西南偏南', '西南', '西南偏西',
      '西', '西北偏西', '西北', '西北偏北'];

    function windDirection(deg) {
      const idx = Math.round(deg / 22.5) % 16;
      return WIND_DIRS[idx];
    }

    function icon(code) {
      return WMO_ICON[code] || '🌡';
    }

    function desc(code) {
      return WMO_DESC[code] || '未知天气';
    }

    function applyBg(code, isNight) {
      const day = WMO_BG[code] || 'day-clear';
      const cls = isNight ? day.replace('day-', 'night-') : day;
      document.body.className = cls;
    }

    // ── DOM refs ──────────────────────────────────────────────────────────────
    const searchInput  = document.getElementById('searchInput');
    const searchBtn    = document.getElementById('searchBtn');
    const errorMsg     = document.getElementById('errorMsg');
    const loading      = document.getElementById('loading');
    const welcome      = document.getElementById('welcome');
    const weatherContent = document.getElementById('weatherContent');
    const refreshInfo  = document.getElementById('refreshInfo');

    // ── State ─────────────────────────────────────────────────────────────────
    let lastQuery = null;
    let refreshTimer = null;

    // ── Search ────────────────────────────────────────────────────────────────
    searchBtn.addEventListener('click', () => doSearch(searchInput.value.trim()));
    searchInput.addEventListener('keydown', e => {
      if (e.key === 'Enter') doSearch(searchInput.value.trim());
    });

    async function doSearch(query) {
      if (!query) return;
      lastQuery = query;
      clearTimer();
      showLoading();
      try {
        const loc = await geocode(query);
        const data = await fetchWeather(loc.latitude, loc.longitude);
        render(loc, data);
        scheduleRefresh();
      } catch (err) {
        showError(err.message);
      }
    }

    // ── Geocoding ─────────────────────────────────────────────────────────────
    async function geocode(name) {
      const url = `https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(name)}&count=1&language=zh&format=json`;
      const res = await fetch(url);
      if (!res.ok) throw new Error('地理编码请求失败');
      const json = await res.json();
      if (!json.results || json.results.length === 0) {
        throw new Error(`找不到城市：「${name}」，请检查拼写`);
      }
      return json.results[0];
    }

    // ── Weather fetch ─────────────────────────────────────────────────────────
    async function fetchWeather(lat, lon) {
      const params = new URLSearchParams({
        latitude: lat,
        longitude: lon,
        current: [
          'temperature_2m', 'apparent_temperature', 'relative_humidity_2m',
          'weather_code', 'wind_speed_10m', 'wind_direction_10m',
          'visibility', 'uv_index', 'surface_pressure', 'is_day'
        ].join(','),
        daily: ['weather_code', 'temperature_2m_max', 'temperature_2m_min'].join(','),
        timezone: 'auto',
        forecast_days: 7,
      });
      const url = `https://api.open-meteo.com/v1/forecast?${params}`;
      const res = await fetch(url);
      if (!res.ok) throw new Error('天气数据请求失败');
      return res.json();
    }

    // ── Render ────────────────────────────────────────────────────────────────
    function render(loc, data) {
      const c = data.current;
      const isNight = c.is_day === 0;
      applyBg(c.weather_code, isNight);

      document.getElementById('cityName').textContent = loc.name;
      document.getElementById('countryName').textContent =
        [loc.admin1, loc.country].filter(Boolean).join(', ');
      document.getElementById('updateTime').textContent =
        '更新于 ' + new Date().toLocaleTimeString('zh-CN', {hour: '2-digit', minute: '2-digit'});

      document.getElementById('weatherIcon').textContent = icon(c.weather_code);
      document.getElementById('temperature').textContent = Math.round(c.temperature_2m) + '°C';
      document.getElementById('feelsLike').textContent = '体感 ' + Math.round(c.apparent_temperature) + '°C';
      document.getElementById('weatherDesc').innerHTML =
        desc(c.weather_code) + '<br><small style="opacity:.6;font-size:.8rem">' +
        (isNight ? '🌙 夜间' : '☀️ 白天') + '</small>';

      document.getElementById('humidity').textContent = c.relative_humidity_2m + '%';
      document.getElementById('windSpeed').textContent = c.wind_speed_10m + ' km/h';
      document.getElementById('windDir').textContent = windDirection(c.wind_direction_10m);
      document.getElementById('visibility').textContent =
        c.visibility >= 1000
          ? (c.visibility / 1000).toFixed(1) + ' km'
          : c.visibility + ' m';
      document.getElementById('uvIndex').textContent = uvLabel(c.uv_index);
      document.getElementById('pressure').textContent = Math.round(c.surface_pressure) + ' hPa';

      // Forecast
      const grid = document.getElementById('forecastGrid');
      grid.innerHTML = '';
      const { time, weather_code, temperature_2m_max, temperature_2m_min } = data.daily;
      time.forEach((t, i) => {
        const card = document.createElement('div');
        card.className = 'forecast-card';
        const date = new Date(t);
        const dayLabel = i === 0 ? '今天' :
          date.toLocaleDateString('zh-CN', { weekday: 'short' });
        card.innerHTML = `
          <div class="forecast-day">${dayLabel}<br><small style="opacity:.5">${date.getMonth()+1}/${date.getDate()}</small></div>
          <div class="forecast-icon">${icon(weather_code[i])}</div>
          <div class="forecast-temp">
            ${Math.round(temperature_2m_max[i])}° <span>/ ${Math.round(temperature_2m_min[i])}°</span>
          </div>
        `;
        grid.appendChild(card);
      });

      hideAll();
      weatherContent.style.display = 'block';
      refreshInfo.style.display = 'block';
      updateRefreshLabel();
    }

    function uvLabel(uv) {
      if (uv === null || uv === undefined) return 'N/A';
      const v = Math.round(uv);
      if (v <= 2) return `${v} 低`;
      if (v <= 5) return `${v} 中`;
      if (v <= 7) return `${v} 高`;
      if (v <= 10) return `${v} 极高`;
      return `${v} 危险`;
    }

    // ── Auto refresh ─────────────────────────────────────────────────────────
    let nextRefresh = null;

    function scheduleRefresh() {
      clearTimer();
      nextRefresh = Date.now() + 10 * 60 * 1000;
      refreshTimer = setInterval(() => {
        const remaining = Math.round((nextRefresh - Date.now()) / 1000);
        if (remaining <= 0) {
          clearTimer();
          doSearch(lastQuery);
        } else {
          updateRefreshLabel();
        }
      }, 10000);
      updateRefreshLabel();
    }

    function updateRefreshLabel() {
      if (!nextRefresh) return;
      const secs = Math.max(0, Math.round((nextRefresh - Date.now()) / 1000));
      const mins = Math.floor(secs / 60);
      const s = secs % 60;
      refreshInfo.textContent = `数据将在 ${mins}:${String(s).padStart(2,'0')} 后自动刷新`;
    }

    function clearTimer() {
      if (refreshTimer) { clearInterval(refreshTimer); refreshTimer = null; }
      nextRefresh = null;
    }

    // ── UI helpers ────────────────────────────────────────────────────────────
    function hideAll() {
      errorMsg.style.display = 'none';
      loading.style.display = 'none';
      welcome.style.display = 'none';
      weatherContent.style.display = 'none';
      refreshInfo.style.display = 'none';
    }

    function showLoading() {
      hideAll();
      loading.style.display = 'block';
    }

    function showError(msg) {
      hideAll();
      welcome.style.display = 'none';
      errorMsg.textContent = '⚠️ ' + msg;
      errorMsg.style.display = 'block';
    }
  </script>
</body>
</html>
