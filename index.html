<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>导航 — 常用网址大全</title>
<style>
:root{
  --bg:#0d0d12;--bg2:#13131a;--bg3:#1a1a24;--bg4:#22222e;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);
  --text:#e2e2f0;--text2:#8888a8;
  --purple:#a78bfa;--blue:#60a5fa;--green:#34d399;--orange:#fb923c;
  --pink:#f472b6;--yellow:#fbbf24;--cyan:#22d3ee;--red:#f87171;
  --teal:#2dd4bf;--lime:#a3e635;
  --radius:12px;--nav-h:58px;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.6}

/* ── Nav ── */
nav{position:fixed;top:0;left:0;right:0;height:var(--nav-h);background:rgba(13,13,18,0.92);backdrop-filter:blur(14px);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:14px;z-index:200}
.nav-logo{font-weight:800;font-size:1.1rem;white-space:nowrap;background:linear-gradient(90deg,var(--purple),var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;text-decoration:none}
.nav-search{flex:1;max-width:500px;position:relative}
.nav-search input{width:100%;padding:8px 14px 8px 36px;background:var(--bg3);border:1px solid var(--border2);border-radius:99px;color:var(--text);font-size:0.9rem;outline:none;transition:border-color .2s}
.nav-search input:focus{border-color:rgba(167,139,250,.5)}
.nav-search input::placeholder{color:var(--text2)}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text2);pointer-events:none}
.nav-count{font-size:0.8rem;color:var(--text2);white-space:nowrap;margin-left:auto}

/* ── Layout ── */
.layout{display:flex;padding-top:var(--nav-h);min-height:100vh}

/* ── Sidebar ── */
.sidebar{width:200px;flex-shrink:0;padding:14px 10px;position:sticky;top:var(--nav-h);height:calc(100vh - var(--nav-h));overflow-y:auto;border-right:1px solid var(--border)}
.sidebar::-webkit-scrollbar{width:3px}
.sidebar::-webkit-scrollbar-thumb{background:#2a2a38;border-radius:2px}
.sidebar-label{font-size:0.67rem;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--text2);padding:0 10px;margin:14px 0 5px}
.sidebar-label:first-child{margin-top:0}
.cat-btn{display:flex;align-items:center;gap:8px;width:100%;padding:7px 10px;border:none;border-radius:8px;background:transparent;color:var(--text2);font-size:0.86rem;cursor:pointer;transition:all .15s;text-align:left}
.cat-btn:hover{background:var(--bg3);color:var(--text)}
.cat-btn.active{background:rgba(167,139,250,.12);color:var(--purple)}
.cat-btn .cnt{margin-left:auto;font-size:0.69rem;background:var(--bg4);padding:1px 6px;border-radius:99px;color:var(--text2)}
.cat-btn.active .cnt{background:rgba(167,139,250,.2);color:var(--purple)}

/* ── Main ── */
.main{flex:1;padding:24px 22px 80px;min-width:0}

/* ── Hero ── */
.hero{background:linear-gradient(135deg,rgba(167,139,250,.07),rgba(34,211,238,.05));border:1px solid rgba(167,139,250,.14);border-radius:16px;padding:22px 28px;margin-bottom:28px;display:flex;align-items:center;gap:24px;flex-wrap:wrap}
.hero-text h1{font-size:1.5rem;font-weight:800;background:linear-gradient(90deg,var(--purple),var(--blue),var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hero-text p{color:var(--text2);font-size:0.88rem;margin-top:5px}
.hero-stats{display:flex;gap:28px;margin-left:auto}
.stat-num{font-size:1.6rem;font-weight:800;background:linear-gradient(135deg,var(--purple),var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1}
.stat-label{font-size:0.68rem;color:var(--text2);margin-top:2px;text-align:center}

/* ── Section ── */
.section-hd{display:flex;align-items:center;gap:10px;margin:6px 0 13px}
.section-hd h2{font-size:0.97rem;font-weight:700}
.section-count{font-size:0.72rem;color:var(--text2);background:var(--bg3);padding:2px 9px;border-radius:99px}
.section-anchor{display:block;padding-top:8px;margin-bottom:36px}

/* ── Grid ── */
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:11px}

/* ── Card ── */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:14px;text-decoration:none;color:var(--text);display:flex;flex-direction:column;gap:8px;position:relative;overflow:hidden;transition:all .18s}
.card::before{content:'';position:absolute;inset:0;opacity:0;transition:opacity .2s;pointer-events:none;border-radius:var(--radius)}
.card:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(0,0,0,.4)}
.card:hover::before{opacity:1}

/* per-category hover colors */
.card[data-c="mine"]:hover{border-color:rgba(167,139,250,.5)}
.card[data-c="mine"]::before{background:radial-gradient(ellipse at 0 0,rgba(167,139,250,.09),transparent 65%)}
.card[data-c="search"]:hover{border-color:rgba(34,211,238,.4)}
.card[data-c="search"]::before{background:radial-gradient(ellipse at 0 0,rgba(34,211,238,.07),transparent 65%)}
.card[data-c="social"]:hover{border-color:rgba(96,165,250,.4)}
.card[data-c="social"]::before{background:radial-gradient(ellipse at 0 0,rgba(96,165,250,.07),transparent 65%)}
.card[data-c="video"]:hover{border-color:rgba(251,191,36,.4)}
.card[data-c="video"]::before{background:radial-gradient(ellipse at 0 0,rgba(251,191,36,.07),transparent 65%)}
.card[data-c="music"]:hover{border-color:rgba(52,211,153,.4)}
.card[data-c="music"]::before{background:radial-gradient(ellipse at 0 0,rgba(52,211,153,.07),transparent 65%)}
.card[data-c="ai"]:hover{border-color:rgba(244,114,182,.4)}
.card[data-c="ai"]::before{background:radial-gradient(ellipse at 0 0,rgba(244,114,182,.07),transparent 65%)}
.card[data-c="dev"]:hover{border-color:rgba(251,146,60,.4)}
.card[data-c="dev"]::before{background:radial-gradient(ellipse at 0 0,rgba(251,146,60,.07),transparent 65%)}
.card[data-c="design"]:hover{border-color:rgba(163,230,53,.4)}
.card[data-c="design"]::before{background:radial-gradient(ellipse at 0 0,rgba(163,230,53,.07),transparent 65%)}
.card[data-c="work"]:hover{border-color:rgba(45,212,191,.4)}
.card[data-c="work"]::before{background:radial-gradient(ellipse at 0 0,rgba(45,212,191,.07),transparent 65%)}
.card[data-c="shop"]:hover{border-color:rgba(248,113,113,.4)}
.card[data-c="shop"]::before{background:radial-gradient(ellipse at 0 0,rgba(248,113,113,.07),transparent 65%)}
.card[data-c="news"]:hover{border-color:rgba(96,165,250,.4)}
.card[data-c="news"]::before{background:radial-gradient(ellipse at 0 0,rgba(96,165,250,.07),transparent 65%)}
.card[data-c="learn"]:hover{border-color:rgba(251,146,60,.4)}
.card[data-c="learn"]::before{background:radial-gradient(ellipse at 0 0,rgba(251,146,60,.07),transparent 65%)}
.card[data-c="finance"]:hover{border-color:rgba(251,191,36,.4)}
.card[data-c="finance"]::before{background:radial-gradient(ellipse at 0 0,rgba(251,191,36,.07),transparent 65%)}

.card-top{display:flex;align-items:flex-start;gap:10px}
.card-icon{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:1.15rem;flex-shrink:0;background:var(--bg3)}
.card-meta{flex:1;min-width:0}
.card-name{font-weight:700;font-size:0.9rem;line-height:1.3;display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.card-url{font-size:0.7rem;color:var(--text2);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.card-desc{font-size:0.79rem;color:var(--text2);line-height:1.55;flex:1}
.card-tags{display:flex;flex-wrap:wrap;gap:4px}
.tag{font-size:0.67rem;padding:2px 7px;border-radius:6px;background:var(--bg4);color:var(--text2)}

/* mine card special */
.card.mine-card{border-color:rgba(167,139,250,.2);background:linear-gradient(135deg,rgba(167,139,250,.05),var(--bg2))}
.card.mine-card .card-icon{background:rgba(167,139,250,.15)}

/* Badges */
.badge{font-size:0.64rem;font-weight:700;padding:2px 6px;border-radius:99px;letter-spacing:.2px;white-space:nowrap}
.badge-cn{background:rgba(34,211,238,.1);color:#22d3ee;border:1px solid rgba(34,211,238,.22)}
.badge-free{background:rgba(52,211,153,.12);color:#34d399;border:1px solid rgba(52,211,153,.25)}
.badge-hot{background:rgba(244,114,182,.1);color:#f472b6;border:1px solid rgba(244,114,182,.22)}
.badge-mine{background:rgba(167,139,250,.15);color:#a78bfa;border:1px solid rgba(167,139,250,.3)}

/* Empty */
.empty{text-align:center;padding:80px 20px;color:var(--text2);display:none}
.empty-icon{font-size:3rem;margin-bottom:12px}

/* Scrollbar */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:#2a2a38;border-radius:3px}

@media(max-width:720px){
  .sidebar{display:none}
  .hero-stats{display:none}
  .cards-grid{grid-template-columns:repeat(auto-fill,minmax(155px,1fr))}
  .main{padding:14px 12px 60px}
}
</style>
</head>

  {c:'news',icon:'🚀',name:'TechCrunch',url:'https://techcrunch.com',desc:'全球顶级科技创业媒体，创业融资、产品发布、独家报道，硅谷风向标。',tags:['国际','创业','融资'],badges:['hot']},

  {c:'news',icon:'📰',name:'Reuters',url:'https://www.reuters.com',desc:'路透社，全球权威财经与国际新闻，客观中立，是众多媒体的消息来源。',tags:['国际','财经','权威'],badges:[]},
  {c:'news',icon:'🛡',name:'The Guardian',url:'https://www.theguardian.com',desc:'英国卫报，独立新闻报道，无付费墙，调查性新闻与社会议题深度报道著称。',tags:['国际','独立','深度'],badges:[]},
  {c:'news',icon:'🔬',name:'Ars Technica',url:'https://arstechnica.com',desc:'面向极客的深度科技报道，技术细节准确，评测深入，评论区技术讨论高质量。',tags:['国际','极客','深度'],badges:[]},
];

const CAT_META = {
  mine:   {label:'我的工具',    color:'var(--purple)',   icon:'⭐'},
  search: {label:'搜索引擎',    color:'var(--cyan)',     icon:'🔍'},
  social: {label:'社交媒体',    color:'var(--blue)',     icon:'💬'},
  video:  {label:'视频娱乐',    color:'var(--yellow)',   icon:'🎬'},
  music:  {label:'音乐',        color:'var(--green)',    icon:'🎵'},
  ai:     {label:'AI 工具',     color:'var(--pink)',     icon:'🤖'},
  dev:    {label:'开发工具',    color:'var(--orange)',   icon:'💻'},
  design: {label:'设计创作',    color:'var(--lime)',     icon:'🎨'},
  work:   {label:'效率办公',    color:'var(--teal)',     icon:'🗃'},
  shop:   {label:'购物电商',    color:'var(--red)',      icon:'🛒'},
  finance:{label:'金融理财',    color:'var(--yellow)',   icon:'💰'},
  news:   {label:'新闻资讯',    color:'var(--blue)',     icon:'📰'},
  learn:  {label:'学习教育',    color:'var(--orange)',   icon:'📚'},
};

const CAT_ORDER = ['mine','search','social','video','music','ai','dev','design','work','shop','finance','news','learn'];
const BADGE_LABEL = {cn:'国内',free:'免费',hot:'🔥热门',mine:'自制'};

let currentCat = 'all';
let searchQ = '';

function badgeHTML(b){
  return `<span class="badge badge-${b}">${BADGE_LABEL[b]||b}</span>`;
}

function renderCards(){
  const container = document.getElementById('container');
  const noResult  = document.getElementById('noResult');
  const q = searchQ.toLowerCase();

  const filtered = SITES.filter(s => {
    const matchCat = currentCat === 'all' || s.c === currentCat;
    const matchQ   = !q ||
      s.name.toLowerCase().includes(q) ||
      s.desc.toLowerCase().includes(q) ||
      (s.tags||[]).some(t => t.toLowerCase().includes(q)) ||
      (CAT_META[s.c]?.label||'').includes(q);
    return matchCat && matchQ;
  });

  document.getElementById('navCount').textContent = filtered.length + ' 个网站';

  if(!filtered.length){
    container.innerHTML = '';
    noResult.style.display = 'block';
    return;
  }
  noResult.style.display = 'none';

  const groups = {};
  if(currentCat === 'all'){
    CAT_ORDER.forEach(c => {
      const items = filtered.filter(s => s.c === c);
      if(items.length) groups[c] = items;
    });
  } else {
    groups[currentCat] = filtered;
  }

  let html = '';
  for(const [cat, items] of Object.entries(groups)){
    const m = CAT_META[cat];
    html += `<div class="section-anchor">
      <div class="section-hd">
        <h2 style="color:${m.color}">${m.icon} ${m.label}</h2>
        <span class="section-count">${items.length}</span>
      </div>
      <div class="cards-grid">`;
    for(const s of items){
      const badges = (s.badges||[]).map(badgeHTML).join('');
      const tags   = (s.tags||[]).map(t=>`<span class="tag">${t}</span>`).join('');
      const href   = s.local ? s.url : s.url;
      const target = s.local ? '' : ' target="_blank" rel="noopener"';
      const mineClass = cat === 'mine' ? ' mine-card' : '';
      html += `<a class="card${mineClass}" data-c="${cat}" href="${href}"${target}>
        <div class="card-top">
          <div class="card-icon">${s.icon}</div>
          <div class="card-meta">
            <div class="card-name">${s.name} ${badges}</div>
            <div class="card-url">${s.local ? s.url : s.url.replace(/^https?:\/\//,'')}</div>
          </div>
        </div>
        <div class="card-desc">${s.desc}</div>
        <div class="card-tags">${tags}</div>
      </a>`;
    }
    html += '</div></div>';
  }
  container.innerHTML = html;
}

function updateCounts(){
  document.getElementById('totalCount').textContent = SITES.length;
  document.getElementById('catCount').textContent = CAT_ORDER.length;
  document.getElementById('cnt-all').textContent = SITES.length;
  CAT_ORDER.forEach(c => {
    const el = document.getElementById('cnt-'+c);
    if(el) el.textContent = SITES.filter(s=>s.c===c).length;
  });
}

function filterCat(cat, btn){
  currentCat = cat;
  document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderCards();
}

let timer;
document.getElementById('searchInput').addEventListener('input', e => {
  clearTimeout(timer);
  timer = setTimeout(() => {
    searchQ = e.target.value.trim();
    renderCards();
  }, 150);
});

updateCounts();
renderCards();
</script>
</body>
</html>
